name: Monorepo CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '20'

jobs:
  # Detectar mudanças
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check file changes
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose.yml'
              - '.github/workflows/backend.yml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'docker-compose.yml'
              - '.github/workflows/frontend.yml'
              - '.github/workflows/ci.yml'
            docker:
              - 'docker-compose.yml'
              - 'backend/Dockerfile'
              - 'frontend/Dockerfile'
              - '.dockerignore'
              - 'backend/.dockerignore'
              - 'frontend/.dockerignore'

  # Backend CI
  backend-ci:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build

  # Frontend CI
  frontend-ci:
    name: Frontend - Build & Lint
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run linter (if configured)
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

  # Docker Build Test
  docker-build:
    name: Docker - Build Test
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.docker == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          cat > .env << EOF
          DATABASE_URL=postgresql://postgres:postgres@db:5432/postgres
          JWT_SECRET=test-secret-for-ci
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=postgres
          NEXT_PUBLIC_API_URL=http://localhost:4000
          EOF

      - name: Build Docker images
        run: docker-compose build

      - name: Start services
        run: docker-compose up -d

      - name: Wait for services
        run: sleep 15

      - name: Check services health
        run: |
          docker-compose ps
          docker-compose logs

      - name: Run backend migrations
        run: docker-compose exec -T backend npx prisma migrate deploy

      - name: Test backend API
        run: |
          curl --fail http://localhost:4000 || exit 1

      - name: Test frontend
        run: |
          curl --fail http://localhost:3000 || exit 1

      - name: Cleanup
        if: always()
        run: docker-compose down -v

  # Integration Tests (opcional - descomente quando tiver testes E2E)
  # integration-tests:
  #   name: Integration Tests
  #   runs-on: ubuntu-latest
  #   needs: [backend-ci, frontend-ci]
  #   if: |
  #     always() &&
  #     (needs.backend-ci.result == 'success' || needs.backend-ci.result == 'skipped') &&
  #     (needs.frontend-ci.result == 'success' || needs.frontend-ci.result == 'skipped')
  #   
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #     
  #     - name: Run E2E tests
  #       run: echo "E2E tests would run here"

  # Status Check (necessário para branch protection)
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, docker-build]
    if: always()
    steps:
      - name: Check CI results
        run: |
          if [[ "${{ needs.backend-ci.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-ci.result }}" == "failure" ]] || \
             [[ "${{ needs.docker-build.result }}" == "failure" ]]; then
            echo "CI failed!"
            exit 1
          fi
          echo "CI passed!"
