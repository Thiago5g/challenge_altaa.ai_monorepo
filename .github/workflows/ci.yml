name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  ci-check:
    name: CI Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Validate Structure
        run: |
          echo "✅ Repositório checado com sucesso"
          echo "📁 Estrutura do projeto:"
          ls -la
          
          if [ -d "backend" ]; then
            echo "✅ Backend encontrado"
          else
            echo "❌ Backend não encontrado"
            exit 1
          fi
          
          if [ -d "frontend" ]; then
            echo "✅ Frontend encontrado"
          else
            echo "❌ Frontend não encontrado"
            exit 1
          fi
          
          echo ""
          echo "🎉 CI passou! Tudo pronto para deploy."
