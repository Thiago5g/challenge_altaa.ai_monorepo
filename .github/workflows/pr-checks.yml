name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-info:
    name: PR Information
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: PR Stats
        run: |
          echo "### 📊 Pull Request Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Base Branch**: ${{ github.base_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Head Branch**: ${{ github.head_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Estatísticas de commits
          COMMITS=$(git rev-list --count origin/${{ github.base_ref }}..HEAD)
          echo "- **Commits**: $COMMITS" >> $GITHUB_STEP_SUMMARY
          
          # Arquivos modificados
          FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          echo "- **Files Changed**: $FILES_CHANGED" >> $GITHUB_STEP_SUMMARY
          
          # Linhas adicionadas/removidas
          git diff --stat origin/${{ github.base_ref }}...HEAD >> $GITHUB_STEP_SUMMARY
      
      - name: Check PR size
        run: |
          FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          LINES_CHANGED=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | grep -oE '[0-9]+ insertion|[0-9]+ deletion' | grep -oE '[0-9]+' | awk '{s+=$1} END {print s}')
          
          echo "Files changed: $FILES_CHANGED"
          echo "Lines changed: $LINES_CHANGED"
          
          if [ "$FILES_CHANGED" -gt 50 ]; then
            echo "⚠️ Warning: This PR changes more than 50 files. Consider breaking it into smaller PRs."
            echo "::warning::Large PR - Consider splitting into smaller changes"
          fi
          
          if [ "$LINES_CHANGED" -gt 1000 ]; then
            echo "⚠️ Warning: This PR changes more than 1000 lines. Consider breaking it into smaller PRs."
            echo "::warning::Large PR - More than 1000 lines changed"
          fi

  label-pr:
    name: Auto Label PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Label based on files
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  check-commit-messages:
    name: Check Commit Messages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Validate commit messages
        run: |
          echo "### 📝 Commit Messages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Pegar commits do PR
          git log --oneline origin/${{ github.base_ref }}..HEAD | while read commit; do
            echo "- \`$commit\`" >> $GITHUB_STEP_SUMMARY
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Verificar padrão de commits (conventional commits)
          INVALID_COMMITS=0
          git log --format=%s origin/${{ github.base_ref }}..HEAD | while read msg; do
            if ! echo "$msg" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?: .+'; then
              echo "::warning::Commit message doesn't follow conventional commits: $msg"
              INVALID_COMMITS=$((INVALID_COMMITS + 1))
            fi
          done
          
          if [ "$INVALID_COMMITS" -gt 0 ]; then
            echo "ℹ️ Tip: Use conventional commits format (feat:, fix:, docs:, etc.)"
          fi

  check-todos:
    name: Check for TODOs
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Find TODOs
        run: |
          echo "### 📝 TODOs and FIXMEs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Buscar TODOs e FIXMEs
          if grep -rn "TODO\|FIXME" backend/ frontend/ --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" 2>/dev/null; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Found TODOs or FIXMEs in the code. Consider creating issues for them." >> $GITHUB_STEP_SUMMARY
            grep -rn "TODO\|FIXME" backend/ frontend/ --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY || true
          else
            echo "✅ No TODOs or FIXMEs found." >> $GITHUB_STEP_SUMMARY
          fi

  check-secrets:
    name: Check for Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true
