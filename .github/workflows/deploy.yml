name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-info:
    name: Deploy Information
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Deploy Info
        run: |
          echo "🚀 Deploy iniciado"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Autor: ${{ github.actor }}"
          echo ""
          echo "✅ Para configurar deploy automático, adicione suas credenciais nos Secrets"
          echo "   - DEPLOY_HOST"
          echo "   - DEPLOY_USER"  
          echo "   - DEPLOY_KEY"

