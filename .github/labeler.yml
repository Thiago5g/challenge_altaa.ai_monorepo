# Configuração para auto-labeling de PRs baseado em arquivos modificados

backend:
  - changed-files:
    - any-glob-to-any-file: 'backend/**'

frontend:
  - changed-files:
    - any-glob-to-any-file: 'frontend/**'

docker:
  - changed-files:
    - any-glob-to-any-file: 
      - 'docker-compose.yml'
      - '**/Dockerfile'
      - '**/.dockerignore'

ci/cd:
  - changed-files:
    - any-glob-to-any-file: '.github/**'

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**'

dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - '**/package.json'
      - '**/package-lock.json'

database:
  - changed-files:
    - any-glob-to-any-file:
      - 'backend/prisma/**'
      - '**/migrations/**'

tests:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.spec.ts'
      - '**/*.test.ts'
      - '**/*.spec.tsx'
      - '**/*.test.tsx'
      - '**/__tests__/**'

enhancement:
  - changed-files:
    - any-glob-to-any-file: 
      - 'frontend/src/components/**'
      - 'frontend/src/app/**'

bug:
  - changed-files:
    - any-glob-to-any-file: 
      - '**/*.test.*'
      - '**/*.spec.*'
    - all-globs-to-all-files: '**/fix/**'
