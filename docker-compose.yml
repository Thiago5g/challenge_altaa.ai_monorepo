services:
  # Backend NestJS
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: altaa-backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
    command: npm run start:dev
    networks:
      - altaa-network

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: altaa-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev
    networks:
      - altaa-network

  # PostgreSQL Database (opcional, se quiser rodar local)
  db:
    image: postgres:16-alpine
    container_name: altaa-database
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-altaa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-altaa123}
      POSTGRES_DB: ${POSTGRES_DB:-altaa_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - altaa-network

networks:
  altaa-network:
    driver: bridge

volumes:
  postgres_data:
